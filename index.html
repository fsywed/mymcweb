<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.7.10 网页版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a2a3a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 24px;
        }
        h1 { text-align: center; margin-bottom: 24px; }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.3s;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .btn:hover { background: #45a049; }
        .info {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
    <!-- 引入 CheerpJ 4.1 加载器（支持 Java 17） -->
    <script src="https://cjrtnc.leaningtech.com/4.1/loader.js"></script>
</head>
<body>
    <div class="container">
        <h1>⛏️ Minecraft 1.7.10 网页版</h1>
        
        <div class="status-card">
            <div id="status-text" style="font-size: 18px; margin-bottom: 8px;">就绪</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <button id="launch-btn" class="btn">🚀 启动游戏</button>

        <div class="info">
            <p>📁 文件结构：</p>
            <ul style="margin-top: 4px;">
                <li>核心文件：/minecraft/versions/1.7.10/1.7.10.jar</li>
                <li>资源文件：/minecraft/assets/</li>
            </ul>
            <p style="margin-top: 8px; color: #aaa;">首次启动会加载资源，请耐心等待</p>
        </div>
    </div>

    <script src="minecraft-launcher.js"></script>
</body>
</html>
