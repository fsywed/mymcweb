<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.7.10 网页版</title>
    <!-- CheerpJ 加载器 -->
    <script src="https://cjrtnc.leaningtech.com/4.0/loader.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a2a3a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 28px;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.3s;
        }
        .btn {
            padding: 12px 24px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2c3e50;
        }
        .btn-secondary:hover {
            background: #34495e;
        }
        .control-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .game-wrapper {
            border: 2px solid #4caf50;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            transition: all 0.3s ease;
            position: relative;
        }
        #game-container {
            width: 100%;
            height: 500px;
            background: #000;
        }
        /* 最大化状态（不隐藏浏览器界面） */
        .game-wrapper.maximized {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            border-radius: 0;
            border: none;
            margin: 0;
            padding: 0;
        }
        .game-wrapper.maximized #game-container {
            height: 100vh;
        }
        /* 全屏状态下隐藏按钮不太好操作，留个退出按钮 */
        .fullscreen-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            display: none;
            gap: 8px;
        }
        .game-wrapper.maximized .fullscreen-controls {
            display: flex;
        }
        .fullscreen-btn {
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #4caf50;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .fullscreen-btn:hover {
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛏️ Minecraft 1.7.10 网页版</h1>
        
        <div class="status-card">
            <div id="status-text" style="font-size: 18px; margin-bottom: 8px;">就绪</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="control-panel">
            <button id="launch-btn" class="btn">🚀 启动游戏</button>
            <button id="maximize-btn" class="btn btn-secondary">🪟 窗口最大化</button>
            <button id="fullscreen-btn" class="btn btn-secondary">⛶ 浏览器全屏</button>
        </div>

        <!-- 游戏容器包装器，用于最大化控制 -->
        <div id="game-wrapper" class="game-wrapper">
            <div id="game-container"></div>
            <div class="fullscreen-controls">
                <button id="exit-maximize" class="fullscreen-btn">退出最大化</button>
            </div>
        </div>
    </div>

    <script src="minecraft-launcher.js"></script>
    <script>
        // 窗口最大化/退出功能（不隐藏浏览器界面）
        const wrapper = document.getElementById('game-wrapper');
        const maximizeBtn = document.getElementById('maximize-btn');
        const exitMaximizeBtn = document.getElementById('exit-maximize');

        maximizeBtn.addEventListener('click', () => {
            wrapper.classList.add('maximized');
        });

        exitMaximizeBtn.addEventListener('click', () => {
            wrapper.classList.remove('maximized');
        });

        // 浏览器全屏功能（真正的全屏，隐藏地址栏）[citation:2][citation:4]
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        fullscreenBtn.addEventListener('click', () => {
            const elem = wrapper;
            
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE/Edge */
                elem.msRequestFullscreen();
            }
        });

        // 监听全屏变化，更新按钮状态 [citation:8]
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                console.log('已退出全屏');
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) {
                console.log('已退出全屏');
            }
        });
    </script>
</body>
</html>
