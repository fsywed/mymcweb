name: 准备 Minecraft 1.7.10 环境

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 创建目录
        run: |
          mkdir -p minecraft/versions/1.7.10
          mkdir -p minecraft/assets/indexes
          mkdir -p minecraft/assets/objects
          mkdir -p temp_assets
      
      - name: 下载核心
        run: |
          curl -L -o minecraft/versions/1.7.10/1.7.10.jar \
            "https://piston-data.mojang.com/v1/objects/1cf89c77ed5e72401b869f66410934804f3d6f52/client.jar"
      
      - name: 下载版本JSON
        run: |
          curl -L -o minecraft/versions/1.7.10/1.7.10.json \
            "https://bmclapi2.bangbang93.com/version/1.7.10/json"
      
      - name: 下载assetIndex
        run: |
          ASSET_URL=$(jq -r '.assetIndex.url' minecraft/versions/1.7.10/1.7.10.json)
          curl -L -o minecraft/assets/indexes/1.7.10.json "$ASSET_URL"
      
      - name: 安装 parallel
        run: sudo apt-get update && sudo apt-get install -y parallel
      
      - name: 生成下载列表
        run: |
          cd minecraft/assets
          jq -r '.objects | to_entries[] | "\(.key) \(.value.hash)"' indexes/1.7.10.json > ../../download_list.txt
          cd ../..
          echo "总文件数: $(wc -l < download_list.txt)"
      
      - name: 多线程下载（20并发）
        run: |
          cat download_list.txt | parallel -j 20 '
            path=$(echo {} | cut -d" " -f1)
            hash=$(echo {} | cut -d" " -f2)
            dir="minecraft/assets/objects/${hash:0:2}"
            mkdir -p $dir
            if [ ! -f "$dir/$hash" ]; then
              curl -L -s -o "$dir/$hash" "https://bmclapi2.bangbang93.com/assets/$hash"
            fi
          '
      
      - name: 提交到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add minecraft/
          git diff --staged --quiet || git commit -m "更新 Minecraft 1.7.10 环境"
          git push
