name: 下载 CheerpJ

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: 下载 cheerpj.js
        run: |
          mkdir -p cheerpj
          curl -L -o cheerpj/cheerpj.js https://raw.githubusercontent.com/fsywed/mymcweb/main/backup/cheerpj.js || \
          curl -L -o cheerpj/cheerpj.js https://gitee.com/fsyuanweb/mymcweb/raw/main/backup/cheerpj.js
      
      - name: 提交
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cheerpj
          git commit -m "add cheerpj" || exit 0
          git push
