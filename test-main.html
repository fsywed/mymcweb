<!DOCTYPE html>
<html>
<head>
    <title>CheerpJ 手动控制测试</title>
    <script src="https://cjrtnc.leaningtech.com/4.0/loader.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { color: #333; }
        .panel { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; margin: 0 10px 10px 0; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin: 20px 0; padding: 10px; background: #e8f4fd; border-radius: 4px; font-family: monospace; }
        .file-status { margin: 10px 0; padding: 10px; background: #fff3cd; border-radius: 4px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 CheerpJ 手动控制测试</h1>
    
    <div class="panel">
        <h3>文件状态</h3>
        <div class="file-status" id="fileStatus">
            ⏳ 尚未检查文件
        </div>
        <button id="checkFileBtn">📂 1. 检查 Jar 文件</button>
        <button id="loadJarBtn">⬇️ 2. 手动加载 Jar</button>
    </div>

    <div class="panel">
        <h3>测试控制</h3>
        <button id="runTestBtn">▶️ 运行测试</button>
        <button id="resetCheerpJBtn">🔄 重置 CheerpJ</button>
        <button id="fullResetBtn">🗑️ 完全重置（清空所有）</button>
    </div>

    <div id="status">
        ⏳ 等待操作...
    </div>

    <div id="game-container" style="width: 100%; height: 200px; border: 1px solid #ccc; margin-top: 20px; display: none;"></div>

    <script>
        // DOM 元素
        const statusDiv = document.getElementById('status');
        const fileStatusDiv = document.getElementById('fileStatus');
        const gameContainer = document.getElementById('game-container');
        
        // 按钮
        const checkFileBtn = document.getElementById('checkFileBtn');
        const loadJarBtn = document.getElementById('loadJarBtn');
        const runTestBtn = document.getElementById('runTestBtn');
        const resetCheerpJBtn = document.getElementById('resetCheerpJBtn');
        const fullResetBtn = document.getElementById('fullResetBtn');

        // 全局状态
        let jarLoaded = false;
        let cheerpjReady = false;
        const JAR_URL = '/app/mymcweb/Test.jar';
        const JAR_CHECK_URL = '/mymcweb/Test.jar';

        // 更新状态显示
        function updateStatus(text, isError = false) {
            statusDiv.innerHTML = text;
            statusDiv.className = isError ? 'error' : '';
        }

        function updateFileStatus(text, isSuccess = false) {
            fileStatusDiv.innerHTML = text;
            fileStatusDiv.className = 'file-status' + (isSuccess ? ' success' : '');
        }

        // 1. 检查文件是否存在
        async function checkFile() {
            updateStatus('🔍 检查文件是否存在...');
            try {
                const res = await fetch(JAR_CHECK_URL, { method: 'HEAD' });
                if (res.ok) {
                    updateFileStatus(`✅ 文件存在 (状态码: ${res.status})`, true);
                    return true;
                } else {
                    updateFileStatus(`❌ 文件不存在 (状态码: ${res.status})`);
                    return false;
                }
            } catch (err) {
                updateFileStatus(`❌ 检查失败: ${err.message}`);
                return false;
            }
        }

        // 2. 手动加载 Jar（其实就是确认文件 + 预热）
        async function loadJar() {
            updateStatus('📦 准备加载 Jar 文件...');
            
            // 先检查文件
            const exists = await checkFile();
            if (!exists) {
                updateStatus('❌ 文件不存在，无法加载', true);
                return false;
            }

            // 如果 CheerpJ 没初始化，先初始化一个最小环境
            if (!window.cheerpjInit) {
                updateStatus('⚠️ CheerpJ 未初始化，正在初始化...');
                try {
                    await cheerpjInit({
                        javaVersion: '8',
                        awt: true
                    });
                    cheerpjReady = true;
                    updateStatus('✅ CheerpJ 初始化完成');
                } catch (err) {
                    updateStatus(`❌ CheerpJ 初始化失败: ${err.message}`, true);
                    return false;
                }
            }

            // 尝试预加载 Jar（不运行）
            try {
                updateStatus('⏳ 预加载 Jar 文件中...');
                // 用一个简单的 HEAD 请求触发浏览器缓存
                await fetch(JAR_CHECK_URL);
                
                // 让 CheerpJ 内部也感知到文件
                const testPromise = cheerpjRunJar(JAR_URL, []);
                // 不等待完成，只是触发加载
                
                jarLoaded = true;
                updateStatus('✅ Jar 文件已加载到缓存');
                return true;
            } catch (err) {
                updateStatus(`❌ 预加载失败: ${err.message}`, true);
                return false;
            }
        }

        // 3. 运行测试（带强制预下载）
async function runTest() {
    updateStatus('🚀 准备运行测试...');
    
    // 第一步：强制下载 Jar 文件（确保文件真的到浏览器了）
    updateStatus('⏳ 强制下载 Jar 文件...');
    try {
        const response = await fetch(JAR_CHECK_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        updateStatus(`✅ 文件已下载到缓存 (${blob.size} 字节)`);
    } catch (err) {
        updateStatus(`❌ 文件下载失败: ${err.message}`, true);
        return;
    }
    
    // 第二步：等一小会儿，让浏览器缓存稳定
    await new Promise(r => setTimeout(r, 500));
    
    // 第三步：确保 CheerpJ 已初始化
    if (!window.cheerpjInit) {
        updateStatus('⚠️ CheerpJ 未初始化，正在初始化...');
        try {
            await cheerpjInit({
                javaVersion: '8',
                awt: true
            });
            cheerpjReady = true;
        } catch (err) {
            updateStatus(`❌ CheerpJ 初始化失败: ${err.message}`, true);
            return;
        }
    }

    // 显示容器
    gameContainer.style.display = 'block';
    
    updateStatus('🎮 正在运行测试程序...');
    
    // 第四步：运行 Jar
    try {
        const exitCode = await cheerpjRunJar(JAR_URL, []);
        updateStatus(`✅ 测试完成，退出码: ${exitCode}`);
    } catch (err) {
        updateStatus(`❌ 运行失败: ${err.message}`, true);
        console.error(err);
    }
}

        // 4. 重置 CheerpJ（不清除文件缓存）
        async function resetCheerpJ() {
            updateStatus('🔄 正在重置 CheerpJ 状态...');
            
            // 清理 Canvas
            document.querySelectorAll('canvas').forEach(c => c.remove());
            gameContainer.innerHTML = '';
            gameContainer.style.display = 'none';
            
            // 重置全局状态（但保留 jarLoaded 为 true，因为文件还在）
            cheerpjReady = false;
            
            // 尝试卸载 CheerpJ（不删除脚本，只是重置内部状态）
            try {
                if (window.cheerpj) {
                    await cheerpjRunMain('java.lang.System', ['gc']);
                }
            } catch (e) {
                // 忽略
            }
            
            // 重新初始化
            try {
                await cheerpjInit({
                    javaVersion: '8',
                    awt: true
                });
                cheerpjReady = true;
                updateStatus('✅ CheerpJ 重置并重新初始化成功');
            } catch (err) {
                updateStatus(`❌ 重置失败: ${err.message}`, true);
            }
        }

        // 5. 完全重置（删除脚本、清空一切）
        async function fullReset() {
            updateStatus('🗑️ 完全重置中...');
            
            // 清理所有 CheerpJ 相关元素
            document.querySelectorAll('canvas').forEach(c => c.remove());
            document.querySelectorAll('script[src*="cheerpj"]').forEach(s => s.remove());
            gameContainer.innerHTML = '';
            gameContainer.style.display = 'none';
            
            // 重置全局状态
            jarLoaded = false;
            cheerpjReady = false;
            
            // 重新加载 CheerpJ 脚本
            const script = document.createElement('script');
            script.src = 'https://cjrtnc.leaningtech.com/4.0/loader.js';
            document.head.appendChild(script);
            
            // 等待加载
            await new Promise(r => setTimeout(r, 1000));
            
            updateStatus('✅ 完全重置完成，可以重新开始');
        }

        // 绑定按钮
        checkFileBtn.addEventListener('click', async () => {
            await checkFile();
        });

        loadJarBtn.addEventListener('click', async () => {
            await loadJar();
        });

        runTestBtn.addEventListener('click', async () => {
            await runTest();
        });

        resetCheerpJBtn.addEventListener('click', async () => {
            await resetCheerpJ();
        });

        fullResetBtn.addEventListener('click', async () => {
            await fullReset();
        });

        // 初始化状态
        updateStatus('⏳ 就绪，请按顺序操作：检查文件 → 加载 Jar → 运行测试');
    </script>
</body>
</html>
