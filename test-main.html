<!DOCTYPE html>
<html>
<head>
    <title>CheerpJ 测试</title>
    <script src="https://cjrtnc.leaningtech.com/4.0/loader.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #status { margin-top: 20px; }
        button { padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>CheerpJ 简易测试</h1>
    <button id="runTest">运行测试</button>
    <div id="status"></div>

    <script>
        async function runTest() {
            const status = document.getElementById('status');
            status.textContent = '初始化 CheerpJ...';
            
            try {
                await cheerpjInit({
                    javaVersion: '8',   // 使用 Java 8
                    awt: true
                });
                status.textContent = 'CheerpJ 初始化成功，正在运行测试 jar...';
                
                // 运行 Test.jar
                const exitCode = await cheerpjRunJar('/app/mymcweb/test/Test.jar', []);
                status.textContent = `测试程序退出，代码: ${exitCode}`;
            } catch (e) {
                status.textContent = '错误: ' + e.message;
                console.error(e);
            }
        }

        document.getElementById('runTest').addEventListener('click', runTest);
    </script>
</body>
</html>
