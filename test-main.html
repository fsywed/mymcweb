<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CheerpJ 快速测试</title>
    <script src="https://cjrtnc.leaningtech.com/4.1/loader.js"></script>
    <style>
        body { background: #1e1e1e; color: #ddd; font-family: monospace; padding: 20px; }
        #log { background: #252526; padding: 15px; border-radius: 8px; height: 200px; overflow-y: auto; margin-bottom: 20px; }
        #game { width: 854px; height: 480px; border: 2px solid #4caf50; background: #000; border-radius: 4px; }
        button { background: #0e639c; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
    </style>
</head>
<body>
    <h2>🧪 CheerpJ 快速测试（3秒自动关闭）</h2>
    <button id="runBtn">🚀 运行 QuickTest.jar</button>
    <div id="log">📋 准备就绪，点击按钮...<br></div>
    <div id="game"></div>

    <script>
        const logDiv = document.getElementById('log');
        const runBtn = document.getElementById('runBtn');

        function log(msg, isError = false) {
            const span = document.createElement('div');
            span.innerHTML = msg;
            span.style.color = isError ? '#f48771' : '#4ec9b0';
            logDiv.appendChild(span);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        runBtn.onclick = async () => {
            runBtn.disabled = true;
            log('⏳ 开始测试...');

            try {
                log('📌 初始化 CheerpJ...');
                await cheerpjInit({ javaVersion: '8', awt: true, canvas: '#game' });
                log('✅ 初始化成功');

                log('📌 下载 QuickTest.jar...');
                const res = await fetch('/Test.jar');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.arrayBuffer();
                log(`✅ 下载成功 (${data.byteLength} 字节)`);

                log('📌 注入虚拟文件系统...');
                await cheerpOSAddStringFile('/str/Test.jar', new Uint8Array(data));
                log('✅ 注入成功');

                log('🎮 运行程序，窗口将在 3 秒后自动关闭...');
                const exitCode = await cheerpjRunJar('/str/Test.jar', []);
                log(`✅ 程序退出，代码: ${exitCode}`);
                log('🎉 测试完成！');

            } catch (err) {
                log(`❌ 失败: ${err.message}`, true);
            } finally {
                runBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
